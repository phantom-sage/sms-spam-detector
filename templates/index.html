<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كاشف الرسائل المزعجة</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --spam-color: #ef4444;
      --ham-color:  #22c55e;
      --bg-dark:    #0f172a;
      --card-bg:    #1e293b;
      --border:     #334155;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg-dark);
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1rem 3rem;
      overflow-y: auto;
    }

    .card-main {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .sms-textarea {
      background: #0f172a;
      border: 1.5px solid var(--border);
      border-radius: 0.85rem;
      color: #f1f5f9;
      font-size: 1rem;
      padding: 1rem 1.1rem;
      width: 100%;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s;
      outline: none;
    }

    .sms-textarea::placeholder { color: #475569; }

    .sms-textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .submit-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 0.85rem;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.8rem 1.5rem;
      width: 100%;
      margin-top: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Result card ── */
    #result {
      margin-top: 1.75rem;
      display: none;
    }

    .result-inner {
      border-radius: 1rem;
      padding: 1.5rem 1.25rem;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .result-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      border-radius: inherit;
    }

    .result-inner.spam {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.08);
    }

    .result-inner.ham {
      border-color: rgba(34, 197, 94, 0.45);
      background: rgba(34, 197, 94, 0.08);
    }

    .result-inner.spam::before { background: var(--spam-color); }
    .result-inner.ham::before  { background: var(--ham-color); }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .result-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .spam .result-icon { background: rgba(239, 68, 68, 0.18); }
    .ham  .result-icon { background: rgba(34, 197, 94, 0.18); }

    .result-label {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .spam .result-label { color: #f87171; }
    .ham  .result-label { color: #4ade80; }

    .badge-verdict {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.28em 0.75em;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .spam .badge-verdict {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .ham .badge-verdict {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }

    /* progress bar */
    .prob-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .prob-label { font-size: 0.82rem; color: var(--text-muted); }
    .prob-value { font-size: 0.95rem; font-weight: 700; }

    .spam .prob-value { color: #f87171; }
    .ham  .prob-value { color: #4ade80; }

    .progress {
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .spam .progress-fill { background: linear-gradient(90deg, #ef4444, #f87171); }
    .ham  .progress-fill { background: linear-gradient(90deg, #22c55e, #4ade80); }

    /* ── Spinner ── */
    .spinner-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 1.5rem;
    }

    .spinner-wrap.active { display: flex; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 0.75rem;
      color: #fca5a5;
      font-size: 0.88rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      display: none;
    }

    /* ── Char counter ── */
    .char-counter {
      text-align: left;
      font-size: 0.78rem;
      color: #475569;
      margin-top: 0.35rem;
    }
  </style>
</head>
<body>
  <div class="card-main">

    <div class="logo">🛡️</div>
    <h1>كاشف الرسائل المزعجة</h1>
    <p class="subtitle">ادخل نص الرسالة وسنحدد إذا كانت مزعجة أم لا</p>

    <textarea
      id="smsInput"
      class="sms-textarea"
      placeholder="اكتب نص الرسالة هنا..."
      maxlength="1000"
      dir="auto"
    ></textarea>
    <div class="char-counter"><span id="charCount">0</span> / 1000</div>

    <button class="submit-btn" id="checkBtn" onclick="checkMessage()">
      <span id="btnText">افحص</span>
    </button>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <span>جاري التحليل...</span>
    </div>

    <div class="error-box" id="errorBox"></div>

    <!-- Result -->
    <div id="result">
      <div class="result-inner" id="resultInner">
        <div class="result-header">
          <div class="result-icon" id="resultIcon"></div>
          <div>
            <div class="result-label" id="resultLabel"></div>
            <span class="badge-verdict" id="resultBadge"></span>
          </div>
        </div>
        <div class="prob-row">
          <span class="prob-label">نسبة الثقة</span>
          <span class="prob-value" id="probValue"></span>
        </div>
        <div class="progress">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const input    = document.getElementById('smsInput');
    const charCount = document.getElementById('charCount');

    input.addEventListener('input', () => {
      charCount.textContent = input.value.length;
    });

    // allow Ctrl+Enter to submit
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) checkMessage();
    });

    async function checkMessage() {
      const message = input.value.trim();

      // reset UI
      hide('result');
      hide('errorBox');

      if (!message) {
        showError('الرجاء إدخال نص الرسالة أولاً.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        showResult(data);
      } catch (err) {
        showError('حدث خطأ أثناء الاتصال بالخادم. حاول مرة أخرى.');
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    function showResult({ label, probability }) {
      const isSpam = label === 'SPAM';

      const inner    = document.getElementById('resultInner');
      const icon     = document.getElementById('resultIcon');
      const lbl      = document.getElementById('resultLabel');
      const badge    = document.getElementById('resultBadge');
      const probVal  = document.getElementById('probValue');
      const fill     = document.getElementById('progressFill');

      inner.className = `result-inner ${isSpam ? 'spam' : 'ham'}`;
      icon.textContent = isSpam ? '🚨' : '✅';
      lbl.textContent  = isSpam ? 'SPAM' : 'HAM';

      badge.textContent = isSpam ? 'رسالة مزعجة' : 'رسالة موثوقة';
      probVal.textContent = `${probability}%`;

      // animate progress bar
      fill.style.width = '0%';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.style.width = `${probability}%`;
        });
      });

      show('result');
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }

    function setLoading(on) {
      const btn     = document.getElementById('checkBtn');
      const spinner = document.getElementById('spinner');
      btn.disabled  = on;
      spinner.classList.toggle('active', on);
      document.getElementById('btnText').textContent = on ? 'جاري الفحص...' : 'افحص';
    }

    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none';  }
  </script>
</body>
</html>
